version: "3"

services:
  opencanary:
    build:
      context: .
      network: host
    container_name: opencanary
    hostname: "opencanary"
    ports:
      - "2222:22"
      - "8080:80"
    volumes:
      - ./data/root:/root
      - ./data/log:/var/log/opencanary
    restart: unless-stopped
